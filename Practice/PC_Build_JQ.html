<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pc build</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container p-2 border bg-primary border-primary my-3 rounded shadow" style="width:600px;">
        <h1 class="text-white text-center mb-4">Constituer votre PC</h1>
        <div class="form p-2 bg-light bg-opacity-75 rounded">
        <div class="mb-3">
            <label class="form-label text-success">Carte mere</label>
            <select class="form-select" id="carte">
                <option disabled selected>Choisir une Carte mere</option>
                <option value="asus">Asus</option>
                <option value="via">Via</option>
                <option value="sis">Sis</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label text-success">Ecran</label>
            <div class="taille d-flex flex-row gap-4">
                <h6 class="me-3">Taille :</h6>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="taille" id="15" value="15" checked>
                    <label class="form-check-label" for="15">15"</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="taille" id="17" value="17">
                    <label class="form-check-label" for="17">17"</label>
                </div>
            </div>
            <div class="taille d-flex flex-row gap-4">
                <h6 class="me-3">Type :</h6>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="type" id="plat" value="plat" checked>
                    <label class="form-check-label" for="plat">Plat</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="type" id="cathodique" value="cathodique">
                    <label class="form-check-label" for="cathodique">Cathodique</label>
                </div>
            </div>
        </div>

        <div class="mb-3 d-flex flex-row gap-4">
            <label class="form-label text-success">Options</label>
            <div class="d-flex flex-column gap-1">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="satellite" value="satellite">
                    <label class="form-check-label" for="satellite">Carte Satellite</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="imprimante" value="imprimante">
                    <label class="form-check-label" for="imprimante">Imprimante</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="scanner" value="scanner">
                    <label class="form-check-label" for="scanner">Scanner</label>
                </div>
            </div>
        </div>

        <div class="mb-3 taille d-flex flex-row gap-4">
            <label class="form-label text-success">categorie</label>
            <select class="form-select" id="categorie">
                <option disabled selected>Choisir une catégorie</option>
                <option value="etudiant">Etudiant</option>
                <option value="autre">Autre</option>
            </select>
        </div>

        <div class="mb-3 taille d-flex flex-row gap-4">
            <label class="form-label">Taux de reduction correspondant</label>
            <input type="text" readonly class="form-control" id="taux">
        </div>
        <div class="d-flex justify-content-between">
            <button type="button" class="btn btn-primary m-3 col-3" id="calBtn">Calculer prix</button>
            <div class="resu  taille d-flex flex-row gap-2">
                <label class="form-label m-2">Ce PC vous Coutera :</label>
                <input type="text" readonly class="form-control" id="finResult">
            </div>
        </div>
        </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('#calBtn').addEventListener('click', function()
        {
            let carte=document.querySelector('select').value;
            let taille=document.querySelector('input[name="taille"]:checked').value;
            let type=document.querySelector('input[name="type"]:checked').value;

            let categorie=document.getElementById('categorie').value;

            let satellite=document.querySelector('#satellite').checked;
            let imprimante=document.querySelector('#imprimante').checked;
            let scanner=document.querySelector('#scanner').checked;
            let prix=0;
            
            if (carte==='asus') prix=prix+700;
            if (carte==='via') prix=prix+600;
            if (carte==='sis') prix=prix+500;
            
            if (taille==='15' && type==='plat') {prix=prix+1500;}
            else if (taille==='17' && type==='plat') {prix=prix+2000;}
            else if (taille==='15' && type==='cathodique') {prix=prix+2000;}
            else if (taille==='17' && type==='cathodique') {prix=prix+2000;}
    
            
            if (satellite) prix=prix+900;
            if (imprimante) prix=prix+600;
            if (scanner) prix=prix+600;
            
            if (categorie==='etudiant'){
                document.querySelector('#taux').value='- 20%';
                prix=prix-(1-0.2);
                }
            else if (categorie==='autre'){
                document.querySelector('#taux').value='- 10%';
                prix=prix-(1-0.1);
                }
            document.querySelector('#finResult').textContent=`Prix totale est: ${prix.toFixed(2)} $`;
            document.querySelector('#finResult').value=`${prix.toFixed(2)} $`;
        });
    </script>
</body>
</html>
