<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h2>Manage Courses</h2>
        <form action="" name="formCC">
            <div class="row">
                <div class="col"><input type="text" class="form-control" name="title" id="title"></div>
                <div class="col"><input type="number" class="form-control" name="price" id="price"></div>
                <div class="col"><button class="btn btn-sm btn-primary" type="button" id="addBtn">Add</button></div>
            </div>
            <table class="table table-striped" id="CCTable">
                <thead>
                    <tr><th>name</th><th>price</th><th>action</th></tr>
                </thead>
                <tbody>

                </tbody>
            </table>
        </form>
    </div>
    <script type="text/javascript">
        document.querySelector("#addBtn").addEventListener('click',addRow)
        function addRow() {
            let title=document.querySelector("#title").value;
            let price=document.querySelector("#price").value;
            if (title.trim()==='' || parseInt(price)<0){
                alert("Please insert course data first !");
                return;
            }
            let newRow=document.createElement("tr");
            newRow.innerHTML=`
            <td>${title}</td>
            <td>${price}</td>
            <td>
                <button type="button" class="btn btn-sm btn-success" id="edbtn" onclick="edRow(this)">edit</button>
                <button type="button" class="btn btn-sm btn-danger" id="delbtn" onclick="delRow(this)">delete</button>
            </td>`;
            document.querySelector("#CCTable tbody").appendChild(newRow);
            document.querySelector("#title").value='';
            document.querySelector("#price").value='';
        }

        function delRow(button) {
            button.closest('tr').remove();
        }

        let editingRow=null;
        function edRow(button) {
            editingRow=button.closest('tr'); //button.parentElement.parentElement;
            let title=editingRow.children[0].innerText;
            let price=editingRow.children[1].innerText;
            document.querySelector("#title").value=title;
            document.querySelector("#price").value=price;
            document.querySelector("#addBtn").textContent="update";
            
        }
    </script>
</body>
</html>
