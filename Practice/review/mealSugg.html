<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container d-flex flex-column justify-content-center m-2 p-2 gap-5">
        <div class="alimInput d-flex flex-row justify-content-center gap-3">
            <label for="alim form-label">
                Aliments
            </label>
            <input class="form-control" type="text" id="alim">
            <button type="button" id="btnAdd" class="btn btn-sm btn-primary">Ajouter</button>
            <button type="button" id="btnDel" class="btn btn-sm btn-danger">Supprimer</button>
        </div>
        <div class="result container d-flex flex-row justify-content-center gap-3">
            <div class="list col-4">
                <ul class="selection">
                    
                </ul>
            </div>
            <div class="cards col-2">
                <!--<div class="card">
                <img src="kimia-kazemi-2T4Ye8UCrCY-unsplash.jpg" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Meal Name</h5>
                    <p class="card-text">Meal desc.</p>
                    <a href="mealName.html" class="btn btn-primary col-12">details</a>
                </div>
                </div>-->
            </div>
        </div>
    </div>
    <script type="text/javascript">
      
        async function getMeals(){
            const response=await fetch('meals.json');
            const data=await response.json();
            return data.moroccan_meals;
            }

        
        function getSelectedIngredients(){
            const items=document.querySelectorAll('.selection li');
            return Array.from(items).map(li=>li.textContent.toLowerCase().trim());
            }

        
        async function renderCards(){
            const meals=await getMeals();
            const selected=getSelectedIngredients();
            const cardsDiv=document.querySelector('.cards');
            cardsDiv.innerHTML='';

            if (selected.length===0) return;

            const matchingMeals=meals.filter(meal =>
                selected.every(ingredient =>
                meal.ingredients.some(i=>i.toLowerCase().includes(ingredient))
                )
            );

            if (matchingMeals.length===0){
                cardsDiv.innerHTML='<p class="text-muted">No matching meals found.</p>';
                return;
            }

            matchingMeals.forEach(meal=>{
                const card=document.createElement('div');
                card.classList.add('card', 'mb-3');
                card.style.width='18rem';
                card.innerHTML=`
                <img src="${meal.image}" class="card-img-top" alt="${meal.name}">
                <div class="card-body">
                    <h5 class="card-title">${meal.name}</h5>
                    <p class="card-text">${meal.description}</p>
                    <a href="${meal.name.replace(/\s+/g, '')}.html" class="btn btn-primary col-12">Details</a>
                </div>
                `;
                cardsDiv.appendChild(card);
            });
            }

        document.getElementById('btnAdd').addEventListener('click', ()=>{
            const input=document.getElementById('alim');
            const value=input.value.trim();

            if (value==='') return;

            const li=document.createElement('li');
            li.textContent=value;
            document.querySelector('.selection').appendChild(li);

            input.value='';
            renderCards();
            });

        document.getElementById('alim').addEventListener('keydown', (e)=>{
            if (e.key==='Enter') document.getElementById('btnAdd').click();
            });


        document.getElementById('btnDel').addEventListener('click',()=>{
            const ul=document.querySelector('.selection');
            if (ul.lastElementChild){
                ul.removeChild(ul.lastElementChild);
                renderCards();
            }
            });
    </script>
</body>
</html>
