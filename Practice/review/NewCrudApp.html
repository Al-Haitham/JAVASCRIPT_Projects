<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="d-flex justify-content-center">

    <div class="container bg-dark bg-opacity-10 rounded py-2 m-3 d-flex justify-content-center">
        <div class="container m-3 d-flex flex-column col-8 justify-content-center background-light">
            <h2 class="text-center">Gestion de Contacts (CRUD)</h2>
            
            <form action="" class="contact bg-white px-3 rounded">
                <label for="nom" class="mt-3">Nom</label>
                    <input class="form-control" type="text" pattern="" required>
                <label for="Email" class="mt-3">Email</label>
                    <input class="form-control" type="text" pattern="" required>
                
                <button class="btn btn-primary my-3">Ajouter</button>
            </form>

            <input type="text" placeholder="Rechercher un Contact.." class="form-control my-3">
            <table class="table-striped">
                <thead>
                    <tr class="text-light bg-black px-3">
                        <th>Nom</th><th>Email</th><th>Actions</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>
