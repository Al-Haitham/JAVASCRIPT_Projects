<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Document</title>
</head>
<body class="d-flex justify-content-center">

    <div class="container bg-dark bg-opacity-10 rounded py-2 m-3 d-flex justify-content-center">
        <div class="container m-3 d-flex flex-column col-8 justify-content-center background-light">
            <h2 class="text-center">Gestion de Contacts (CRUD)</h2>
            
            <form action="" class="contact bg-white px-3 rounded">
                <label for="nom" class="mt-3">Nom</label>
                    <input class="form-control" type="text" id="nom" pattern="" required>
                <label for="Email" class="mt-3">Email</label>
                    <input class="form-control" type="email" id="email" pattern="" required>
                
                <button type="button" class="btn btn-primary my-3" id="addBtn">Ajouter</button>
            </form>

            <input type="text" placeholder="Rechercher un Contact.." id="contactRech" class="form-control my-3">
            <table class="table-striped">
                <thead>
                    <tr class="text-light bg-black px-3">
                        <th>Nom</th><th>Email</th><th>Actions</th>
                    </tr>
                    <tbody></tbody>
                </thead>
            </table>
        </div>
    </div>
    <script type="text/javascript">
        document.querySelector('#addBtn').addEventListener('click',addContact);
        function addContact(button){
            let nom=document.querySelector("#nom").value;
            let email=document.querySelector("#email").value;
            if (nom.trim()==='' || email.trim()===''){
                alert("Saisir les info du Contact !");
                return;
            }
        
            let newContact=document.createElement('tr')
            newContact.innerHTML=`
            <td>${nom}</td>
            <td>${email}</td>
            `

        }
    </script>
</body>
</html>
