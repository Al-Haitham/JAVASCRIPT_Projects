<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moroccan Meals Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid py-5">
        <!-- Header -->
        <div class="row mb-5">
            <div class="col-12 text-center">
                <h1 class="display-4 fw-bold">Moroccan Meals Finder</h1>
                <p class="text-muted">Select ingredients to find matching meals</p>
            </div>
        </div>

        <!-- Input Section -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-12 col-md-6">
                                <label for="alim" class="form-label fw-semibold">Add Ingredient</label>
                                <input class="form-control form-control-lg" type="text" id="alim" placeholder="Enter ingredient name">
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="d-flex gap-2">
                                    <button type="button" id="btnAdd" class="btn btn-primary btn-lg flex-grow-1">
                                        <i class="bi bi-plus-circle"></i> Add
                                    </button>
                                    <button type="button" id="btnDel" class="btn btn-danger btn-lg flex-grow-1">
                                        <i class="bi bi-trash"></i> Remove Last
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="row g-4">
            <!-- Ingredients List -->
            <div class="col-12 col-lg-3">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Selected Ingredients</h5>
                    </div>
                    <div class="card-body">
                        <ul class="selection list-group list-group-flush" style="min-height: 200px;">
                            <li class="list-group-item text-muted text-center py-5">No ingredients added yet</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Meal Cards -->
            <div class="col-12 col-lg-9">
                <div class="cards">
                    <div class="row g-4" id="cardsContainer">
                        <div class="col-12 text-center text-muted py-5">
                            <p>Add ingredients to see matching meals</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript">
        async function getMeals() {
        const response = await fetch('meals.json');
        const data = await response.json();
        return data.moroccan_meals;
        }

        // Get selected ingredients from the list
        function getSelectedIngredients() {
        const items = document.querySelectorAll('.selection li:not(.text-muted)');
        return Array.from(items).map(li => li.textContent.toLowerCase().trim());
        }

        // Render matching meal cards
        async function renderCards() {
        const meals = await getMeals();
        const selected = getSelectedIngredients();
        const cardsContainer = document.getElementById('cardsContainer');
        cardsContainer.innerHTML = '';

        if (selected.length === 0) {
            cardsContainer.innerHTML = '<div class="col-12 text-center text-muted py-5"><p>Add ingredients to see matching meals</p></div>';
            return;
        }

        const matchingMeals = meals.filter(meal =>
            selected.every(ingredient =>
            meal.ingredients.some(i => i.toLowerCase().includes(ingredient))
            )
        );

        if (matchingMeals.length === 0) {
            cardsContainer.innerHTML = '<div class="col-12 text-center text-muted py-5"><p>No matching meals found.</p></div>';
            return;
        }

        matchingMeals.forEach(meal => {
            const col = document.createElement('div');
            col.classList.add('col-12', 'col-md-6', 'col-lg-4');
            col.innerHTML = `
            <div class="card h-100 shadow-sm">
                <img src="${meal.image}" class="card-img-top" alt="${meal.name}" style="height: 200px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                <h5 class="card-title">${meal.name}</h5>
                <p class="card-text text-muted flex-grow-1">${meal.description}</p>
                <a href="#" class="btn btn-primary mt-auto">View Details</a>
                </div>
            </div>
            `;
            cardsContainer.appendChild(col);
        });
        }

        // Update ingredient list display
        function updateListDisplay() {
        const ul = document.querySelector('.selection');
        const items = ul.querySelectorAll('li:not(.text-muted)');
        
        if (items.length === 0) {
            ul.innerHTML = '<li class="list-group-item text-muted text-center py-5">No ingredients added yet</li>';
        }
        }

        // Add ingredient to list
        document.getElementById('btnAdd').addEventListener('click', () => {
        const input = document.getElementById('alim');
        const value = input.value.trim();

        if (value === '') return;

        const ul = document.querySelector('.selection');
        
        // Remove placeholder if exists
        const placeholder = ul.querySelector('.text-muted');
        if (placeholder) placeholder.remove();

        const li = document.createElement('li');
        li.classList.add('list-group-item', 'd-flex', 'justify-content-between', 'align-items-center');
        li.innerHTML = `
            <span>${value}</span>
            <span class="badge bg-primary rounded-pill">${ul.children.length + 1}</span>
        `;
        ul.appendChild(li);

        input.value = '';
        input.focus();
        renderCards();
        });

        // Allow pressing Enter to add
        document.getElementById('alim').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('btnAdd').click();
        });

        // Delete last ingredient from list
        document.getElementById('btnDel').addEventListener('click', () => {
        const ul = document.querySelector('.selection');
        const items = ul.querySelectorAll('li:not(.text-muted)');
        
        if (items.length > 0) {
            items[items.length - 1].remove();
            updateListDisplay();
            renderCards();
        }
        });
    </script>
</body>
</html>
