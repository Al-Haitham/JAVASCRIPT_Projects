<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>pratique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<body class="container mt-4">
    <h2 class="mb-4">Soumission de candidatur</h2>
    
    <form id="formCand" class="mb-4">
        <div class="mb-3">
            <label for="nomCompl" class="form-label">Nom Complet :</label>
            <input type="text" class="form-control" id="nomCompl" required>
        </div>
        <div class="mb-3">
            <label for="ville" class="form-label">Ville :</label>
            <input type="text" class="form-control" id="ville" required>
        </div>
        <div class="mb-3">
            <label for="comptc" class="form-label">Compétence :</label>
            <input type="text" class="form-control" id="comptc" required>
        </div>
        <div class="mb-3">
            <label for="dispo" class="form-label">Disponibilité :</label>
            <input type="text" class="form-control" id="dispo" required>
        </div>
        <div class="mb-3">
            <label for="typeM" class="form-label">Type de mission souhaitée :</label>
            <input type="text" class="form-control" id="typeM" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email :</label>
            <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
            <label for="mdp" class="form-label">Mot de passe :</label>
            <input type="password" class="form-control" id="mdp" required>
        </div>
        <button type="submit" class="btn btn-primary">Soumettre</button>
    </form>

    <h3>Tableau des Candidatures</h3>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nom Complet</th>
                <th>Ville</th>
                <th>Competence</th>
                <th>Disponibilite</th>
                <th>Type de mission</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tabCand">
        </tbody>
    </table>

    <script>
        let candidates=[];

        document.getElementById('formCand').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let nomCompl=$('#nomCompl').val().trim();
            let ville=$('#ville').val().trim();
            let comptc=$('#comptc').val().trim();
            let dispo=$('#dispo').val().trim();
            let typeM=$('#typeM').val().trim();
            let email=$('#email').val().trim();
            let mdp=$('#mdp').val();
            
            if (!nomCompl || !ville || !comptc || !dispo || !typeM || !email || !mdp) {
                alert('Veuillez remplir tous les champs.');
                return;
            }
            
            if (mdp.length<6) {
                alert('Le mot de passe doit avoir au moins 6 caractères');
                return;
            }
            
            const candidate={ nomCompl, ville, comptc, dispo, typeM, email, mdp };
            
            candidates.push(candidate);
            addCandidateToTable(candidate);
            this.reset();
        });

        const addCandidateToTable=(candidate)=>{
            const tableBody=$('#tabCand');
            const row=$('<tr></tr>');
            
            row.html(`
                <td>${candidate.nomCompl}</td>
                <td>${candidate.ville}</td>
                <td>${candidate.comptc}</td>
                <td>${candidate.dispo}</td>
                <td>${candidate.typeM}</td>
                <td><button class="btn btn-sm btn-danger" onclick="delCand(this)">Supprimer</button></td>
            `);
            
            tableBody.append(row);
        }

        const delCand=(button)=>{
            const row=$(button).closest('tr');
            const index=row.index();
            
            if (confirm('supprimer candidature?')) {
                candidates.splice(index, 1);
                row.remove();
            }
        }
    </script>
</body>
</html>
