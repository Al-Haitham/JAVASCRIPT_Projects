<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

                            <option value="espagne">Espagne</option>
                            <option value="italie">Italie</option>
                        </select>
                    </label><br>
                    <label for="cin">CIN / Passport :<br>
                        <input type="text" class="form-control"  id="cin">
                    </label><br>
                    <label for="nom">Nom :<br>

                    </label><br>
                    <label for="prenom">Prenom :<br>

                    </label>

                </fieldset>
            </div>

            <div class="col-6">
                <fiedset>
                    <legend>Match et Categorie: </legend>
                        <select name="match" id="match" multiple>
                            
                        </select>
                        <label for="">
                            Categories du Tickets
                            <label for="">
                                Categorie 1
                                <input type="radio">
                            </label>
                            <label for="">
                                Categorie 2
                                <input type="radio">
                            </label>
                        </label>
                        <button type="button" class="btn btn-primary" onclick="">vendre ticket</button>
                </fiedset>
            </div>
        </form>

    </div>
</body>
</html>
