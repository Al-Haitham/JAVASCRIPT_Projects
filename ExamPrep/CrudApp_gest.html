<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container my-4">
    
        <div class="container my-4">
            <h3 class="text-center">Gestion des utilisateurs</h3>
            <div class="form my-4">
            <input type="text" placeholder="nom.." id="nom" class="col-3">
            <input type="text" placeholder="email.." id="email" class="col-3">
            <select name="domain" id="dom" class="col-3">
                <option value="" disabled selected>choisir un domaine</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Design">Design</option>
            </select>
            <button class="btn btn-sm btn-primary col" id="btnAdd" onclick="saveUser()">Ajouter + </button>
            </div>
        
    </div>
    <div class="container my-4">
        <div class="row">
            <input type="text" id="search" placeholder="rechercher.." class="col-8" onkeyup="showUsers()">
            <select name="domain" id="domFilter" class="col-4" onchange="showUsers()">
                <option value="" selected>Toutes les domaines</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Design">Design</option>
            </select>
        </div>
    </div>
    <div class="result">
        <table class="table">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Email</th>
                    <th>Domaine</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTable">
                <!--           -->
            </tbody>
        </table>
    </div>
    </div>


    <script type="text/javascript">
        let users=[];
        let editIndex=null;

        const saveUser=()=>{
            let nom=$('#nom').val();
            let email=$('#email').val();
            let dom=$("#dom").val();

            if (!nom || !email || !dom){
                alert("Veuillez remplir tous les champs");
                return;
            }

            if (editIndex===null){
                users.push({
                    id:Date.now(),
                    nom:nom,
                    email:email,
                    dom:dom
                });
            }else{
                users[editIndex]={
                    id:users[editIndex].id,
                    nom:nom,
                    email:email,
                    dom:dom
                };
                editIndex=null;
            }
            clearForm();
            showUsers();
        }

        const showUsers=()=>{
            let search=$("#search").val();
            let domFilter=$("#domFilter").val();
            let userTable=$("#userTable");
            userTable.html("");

            let filtredData=users.filter(u=>u.nom.toLowerCase().includes(search.toLowerCase()));
            if (domFilter!=""){
                filtredData=filtredData.filter(u=>u.dom===domFilter);
            }
            filtredData.forEach((u,index)=>{
                userTable.append(`
                <tr>
                    <td>${u.nom}</td>
                    <td>${u.email}</td>
                    <td>${u.dom}</td>
                    <td>
                        <button class='btn btn-sm-success' type="button" onclick="editUser(${index})">Modifier</button>
                        <button class='btn btn-sm-danger' type="button" onclick="delUser(${index})">supprimer</button>
                    </td>
                </tr>
                `);
            });
        }

        const delUser=(pos)=>{
            if(confirm("supprimer l'utilisateur?")){
                users.splice(pos,1);
                showUsers();
            }
        }

        const editUser=(index)=>{
            let u=users[index];
            $("#nom").val(u.nom);
            $("#email").val(u.email);
            $("#dom").val(u.dom);
            editIndex=index;
        }

        const clearForm=()=>{
            $("#nom").val('');
            $("#email").val('');
            $("#dom").val('');
        }

    </script>
</body>
</html>
