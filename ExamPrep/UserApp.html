<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container mt-4">
        <h2>CRUD Users App (Card List)</h2>
        
        <div class="mb-3">
            <input type="text" id="name" class="form-control d-inline-block w-auto" placeholder="Nom">
            <input type="number" id="age" class="form-control d-inline-block w-auto" placeholder="Age">
            <button class="btn btn-primary ms-2" onclick="addUser()">Ajouter / Modifier</button>
        </div>
        
        <div class="mb-3">
            <input type="text" id="search" class="form-control d-inline-block w-auto" placeholder="Rechercher par nom...">
            <button class="btn btn-dark ms-2" onclick="sortUsers()">Trier âge</button>
        </div>
        
        <div id="userCards" class="row"></div>
    </div>

    <script>
        let users = [];

        function renderUsers() {
            const container = document.getElementById('userCards');
            container.innerHTML = '';
            users.forEach((user, index) => {
                const card = document.createElement('div');
                card.className = 'card col-md-3';
                card.innerHTML = `
                    <div class="card-body">
                        <h5 class="card-title">${user.name}</h5>
                        <p class="card-text">Age: ${user.age}</p>
                        <button class="btn btn-warning btn-sm me-1" onclick="editUser(${index})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteUser(${index})">Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addUser() {
            const name = document.getElementById('name').value;
            const age = parseInt(document.getElementById('age').value);
            if (name && age) {
                users.push({ name, age });
                document.getElementById('name').value = '';
                document.getElementById('age').value = '';
                renderUsers();
            }
        }

        function editUser(index) {
            const user = users[index];
            document.getElementById('name').value = user.name;
            document.getElementById('age').value = user.age;
            users.splice(index, 1);
            renderUsers();
        }

        function deleteUser(index) {
            users.splice(index, 1);
            renderUsers();
        }
        let sortAsc = true;
        function sortUsers() {
            users.sort((a, b) => sortAsc ? a.age - b.age : b.age - a.age);
            sortAsc = !sortAsc;
            renderUsers();
        }

        renderUsers();
    </script>
</body>
</html>
