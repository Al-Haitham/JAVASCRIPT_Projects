<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h3>USER MANAGEMENT</h3>

        <div class="form">
            <input type="text" class="form-control" id="name" placeholder="name..">
            <input type="email" class="form-control" id="email" placeholder="email..">
            <select name="domain" id="domainInput">
                <option value="" disabled selected>select a domain</option>
                <option value="IT">IT</option>
                <option value="DESIGN">DESIGN</option>
                <option value="HR">HR</option>
                <option value="FINANCE">FINANCE</option>
            </select>
            <div class="gender">
                <label for="male">Male
                    <input type="radio" name="gender" id="male" value="Male" checked></label>
                <label for="female">Female
                    <input type="radio" name="gender" id="female" value="Female"></label>
            </div>
            <button class="btn btn-sm btn-success" onclick="addUser()" id="btnPrim"> + Add</button>
        </div>

        <div class="container">
            <input type="text" onkeyup="displayUsers()" placeholder="Search..." id="search">
            <select name="domain" id="domainFilter" onchange="displayUsers()">
                <option value="" selected>All Domains</option>
                <option value="IT">IT</option>
                <option value="DESIGN">DESIGN</option>
                <option value="HR">HR</option>
                <option value="FINANCE">FINANCE</option>
            </select>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Gender</th>
                    <th>Domain</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTable">
            </tbody>
        </table>
    </div>



    <script type="text/javascript">
        let users=[];
        let editIndex=null;

        const addUser=()=>{
            let name=$('#name').val();
            let email=$('#email').val();
            let domain=$('#domainInput').val();
            let gender=$('[name=gender]:checked').val();

            
            if(!name || !email || !domain ){
                alert("Please fill out all fields first!");
                return;
            }

            if(editIndex==null){
                users.push({
                    name:name,
                    email:email,
                    gender:gender,
                    domain:domain
                });
            }else{
                users[editIndex]={
                    name:name,
                    email:email,
                    gender:gender,
                    domain:domain
                };
                editIndex=null;
                $("btnPrim").text("+ Add");
            }
            clearForm();
            displayUsers();
        }

        const displayUsers=()=>{
            let search=$("#search").val().trim().toLowerCase();
            let domainFilter=$("#domainFilter").val();
            let usersTable=$("#userTable");
            usersTable.html("");

            let filtredData=users;
            if (search){
                filtredData=filtredData.filter(u=>u.name.toLowerCase().includes(search));
            }
            if (domainFilter!=''){
                filtredData=filtredData.filter(u=>u.domain===domainFilter);
            }
            filtredData.forEach((u,index)=>{
                usersTable.append(`
                    <tr>
                        <td>${u.name}</td>
                        <td>${u.email}</td>
                        <td>${u.gender}</td>
                        <td>${u.domain}</td>
                        <td><button type="button" onclick="edit(${index})">Edit</button><button type="button" onclick="del(${index})">Delete</button></td>
                    </tr>
                `)
            })    
        }

        const del=(index)=>{
            if(confirm("Are you sure you want to delete that user?")){
                users.splice(index,1);
                displayUsers();
            }   
        }

        const edit=(index)=>{
            $("btnPrim").text("> Update");
            $("#name").val(users[index].name);
            $("#email").val(users[index].email);
            $(`[name=gender][value='${users[index].gender}']`).prop("checked", true);
            $("#domainInput").val(users[index].domain);
            editIndex=index;
            
        }

        const clearForm=()=>{
            $("#name").val("");
            $("#email").val("");
            $("#male").prop("checked",true);
            $("#domainInput").val("");
        }

    </script>
</body>
</html>
